# HTTP → HTTPS
server {
    listen 80;
    server_name api-aiapi.cn www.api-aiapi.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 主站（用8443端口绕过CLB缓存）
server {
    listen 8443 ssl http2;
    server_name api-aiapi.cn www.api-aiapi.cn;

    ssl_certificate /root/.acme.sh/api-aiapi.cn_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/api-aiapi.cn_ecc/api-aiapi.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html;

    location = /WW_verify_fnnStdLjiKFw6dD5.txt { default_type text/plain; }

    location /api/chat/ { proxy_pass http://127.0.0.1:18789; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /plugins/wecom/ { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location = /wecom { proxy_pass http://127.0.0.1:8080/wecom; proxy_set_header Host $host; }
    location /chat/ { alias /var/www/html/chat/; index index.html; try_files $uri $uri/ /chat/index.html; }
    location = /404.html { root /var/www/html; internal; }
    location = /register { return 302 /console/; }

    location = / { try_files /index.html =404; }
    location = /index.html { root /var/www/html; }
    location /home { try_files /index.html =404; }

    location /landing/ { alias /var/www/html/landing/; index index.html; try_files $uri $uri/ /landing/index.html; }
    location ~* \.(pptx|ppt)$ { root /var/www/html; add_header Content-Disposition 'attachment'; }
    location ~ ^/(pride\.html|get-started\.html|api-doc\.html|article\d*\.html|article6-cover\.png|logo\.png|favicon\.ico|index\.nginx-debian\.html)$ { root /var/www/html; }

    location /api/pay/ { proxy_pass http://127.0.0.1:18900; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }

    location /api/invite/ {
        proxy_pass http://127.0.0.1:18902; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *; add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS'; add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
        if ($request_method = 'OPTIONS') { add_header Access-Control-Allow-Origin *; add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS'; add_header Access-Control-Allow-Headers 'Content-Type, Authorization'; add_header Content-Length 0; add_header Content-Type text/plain; return 204; }
    }

    location /payment/ { alias /var/www/html/payment/; index index.html; try_files $uri $uri/ /payment/index.html; }
    location ~ ^/invite/([A-Za-z0-9]+)$ { return 301 https://api-aiapi.cn/console/#/register?aff=$1; }
    location /console/ { alias /var/www/html/console/; index index.html; try_files $uri $uri/ /console/index.html; }
    location = /login { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }

    location ~ ^/(log|setting|about|token|channel|dashboard|user|pricing|redemption|finance) {
        proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_intercept_errors on;
    }

    location /api/ { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /v1/ { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /static/ { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; expires 7d; }

    location / {
        proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_intercept_errors on;
    }

    error_page 404 /404.html;
}

# 443端口返回临时重定向到8443
server {
    listen 443 ssl http2;
    server_name api-aiapi.cn www.api-aiapi.cn;
    ssl_certificate /root/.acme.sh/api-aiapi.cn_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/api-aiapi.cn_ecc/api-aiapi.cn.key;
    return 301 https://api-aiapi.cn:8443$request_uri;
}
